---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kokumi
nodes:
  - role: control-plane
    extraPortMappings:
      # Port for registry
      - containerPort: 30050
        hostPort: 5000
        protocol: TCP
      # Port for UI
      - containerPort: 30051
        hostPort: 8080
        protocol: TCP
      # Port for Argo CD
      - containerPort: 30052
        hostPort: 8443
        protocol: TCP
