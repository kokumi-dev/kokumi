---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: server
  namespace: system
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: kokumi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: server-role
rules:
- apiGroups:
  - delivery.kokumi.dev
  resources:
  - menus
  - orders
  - preparations
  - recipes
  - servings
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: server-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: server-role
subjects:
- kind: ServiceAccount
  name: server
  namespace: system
---
# Namespaced access to the admin credentials Secret used for login.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: server-auth-reader
  namespace: system
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  # Unprefixed base name; the nameReference config in config/default rewrites
  # this to the prefixed Secret name (e.g. "kokumi-server-auth").
  - server-auth
  verbs:
  - get
  - watch
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: server-auth-reader-binding
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: server-auth-reader
subjects:
- kind: ServiceAccount
  name: server
  namespace: system