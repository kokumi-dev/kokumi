---
# Admin credentials for the Kokumi API server login.
#
# Generate the password hash with htpasswd (bcrypt, "-B"):
#
#   htpasswd -nbB admin 'your-password' | cut -d: -f2
#
# Generate the token signing key with:
#
#   openssl rand -base64 32
#
# The default values below log in as admin / admin and MUST be replaced before
# any non-development use. If this Secret is absent or incomplete the server
# starts with authentication disabled.
apiVersion: v1
kind: Secret
metadata:
  # Base name is intentionally unprefixed: the config/default overlay adds the
  # "kokumi-" namePrefix, producing the final name "kokumi-server-auth" that the
  # server looks up by default. Do NOT prefix it here or it will be
  # double-prefixed (e.g. "kokumi-kokumi-server-auth").
  name: server-auth
  namespace: system
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: kokumi
type: Opaque
stringData:
  username: admin
  # bcrypt hash of "admin" produced by `htpasswd -nbB admin admin`.
  password-hash: "$2y$05$MG5FZ/WlMewHp8kwaoZixeQ8NCXjhp7ZWwx1N40pQ6oc3VfL9Xu0y"
  # Random HMAC key used to sign login tokens. Replace with `openssl rand -base64 32`.
  signing-key: "CHANGEME-replace-with-openssl-rand-base64-32"
