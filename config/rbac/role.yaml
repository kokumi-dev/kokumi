kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - argoproj.io
  resources:
  - applications
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - delivery.kokumi.dev
  resources:
  - menus
  - orders
  - pantries
  - preparations
  - recipes
  - servings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - delivery.kokumi.dev
  resources:
  - menus/finalizers
  - orders/finalizers
  - pantries/finalizers
  - preparations/finalizers
  - recipes/finalizers
  - servings/finalizers
  verbs:
  - update
- apiGroups:
  - delivery.kokumi.dev
  resources:
  - menus/status
  - orders/status
  - pantries/status
  - preparations/status
  - recipes/status
  - servings/status
  verbs:
  - get
  - patch
  - update
